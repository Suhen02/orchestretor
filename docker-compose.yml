services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@postgres:5432/orchestrator
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@postgres:5432/orchestrator
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      replicas: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.example
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_started
    command: streamlit run dashboard/admin_app.py --server.address 0.0.0.0 --server.port 8501

  user-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.example
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8502:8502"
    depends_on:
      api:
        condition: service_started
    command: streamlit run dashboard/user_app.py --server.address 0.0.0.0 --server.port 8502

volumes:
  postgres_data:
